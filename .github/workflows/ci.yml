name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  release:
    # Auto-version + publish on every push to main. semantic-release analyses the
    # conventional commits, computes the next version, writes it into package.json,
    # builds, and publishes to npm with provenance (OIDC — no stored token), then
    # cuts a GitHub release + tag. No releasable commits → no release.
    #
    # Guarded: only runs once npm Trusted Publishing is set up, signalled by the
    # repo variable PUBLISH_ENABLED == 'true'. Until then, pushes to main build +
    # test but skip publishing, so the workflow never fails on a missing registry
    # configuration.
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create git tags + GitHub releases
      id-token: write # mint the OIDC token for npm provenance / trusted publishing
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Semantic release
        run: npx --yes -p semantic-release -p @semantic-release/exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used only as a fallback if Trusted Publishing is not configured.
          # With npm Trusted Publishing (OIDC) no token is needed; leave unset.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
