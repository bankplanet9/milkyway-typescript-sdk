name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  release:
    # Auto-version on every push to main: semantic-release analyses the conventional
    # commits, computes the next version, writes it into package.json, builds, cuts a
    # GitHub release + tag — and publishes to npm with provenance (OIDC, no stored
    # token) only when PUBLISH_ENABLED == 'true' (gated inside publishCmd). So
    # releases/tags happen immediately while npm publishing waits until Trusted
    # Publishing is configured. No releasable commits → no release.
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create git tags + GitHub releases
      id-token: write # mint the OIDC token for npm provenance / trusted publishing
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for OIDC trusted publishing
        # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Semantic release
        run: npx --yes -p semantic-release -p @semantic-release/exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Gates the npm publish step inside publishCmd. Set the repo variable
          # PUBLISH_ENABLED=true once npm Trusted Publishing is configured.
          PUBLISH_ENABLED: ${{ vars.PUBLISH_ENABLED }}
          # Used only as a fallback if Trusted Publishing is not configured.
          # With npm Trusted Publishing (OIDC) no token is needed; leave unset.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
